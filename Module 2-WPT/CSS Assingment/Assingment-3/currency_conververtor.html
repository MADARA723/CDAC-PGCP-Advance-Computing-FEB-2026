<!-- 2) currency_convertor.html
Textfield , dropdown for FROM and TO
Rupee , dollar, euro To = rupee dollar euro
Convert-button = onclick convert the amount and show in paragraph

Rupee 80 = 80 1 $ 

Apply a border over the entire fields
Apply bg color, color font for <p> tag with a internal border using internal stylesheet -->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body{
                border: 2px solid black;
                padding: 20px;
            }
            #result{
                background-color: lightgray;
                color: blue;
                border: 1px solid black;
                padding: 10px;
                width: fit-content;
            }
            </style>
        <title>Document</title>
    </head>
    <body>
        <input type="text" id="currency">
        <select id="from">
            <option value="rupee">Rupee</option>
            <option value="dollar">Dollar</option>
            <option value="euro">Euro</option>
        </select>
        <select id="to">
            <option value="rupee">Rupee</option>
            <option value="dollar">Dollar</option>
            <option value="euro">Euro</option>
        </select>
        <button onclick="convert()">Convert</button>
        <p id="result"></p>
        <script type="text/javascript">
            function convert(){
                let amount =document.getElementById("currency").value;
               let from=document.getElementById("from").value;
                let to=document.getElementById("to").value;
                let result;
                if(from==="rupee" && to==="dollar")
                {
                    result=amount/91;

                }
                else if(from === "dollar" && to==="rupee")
                  {
                    result=amount*91
                  }
                  else if(from ==="rupee" && to==="euro")
                  {
                    result=amount/106;
                  }
                  else if(from=== "euro" && to ==="rupee")
                  {
                    result=amount/106;
                  }
                    else if(from === "dollar" && to==="euro")
                    {
                        result=amount*0.85;
                    }
                    else if(from === "euro" && to==="dollar")
                    {
                        result=amount*1.18;
                    }
                    else
                    {
                        result=amount;
                    }
                    document.getElementById("result").innerHTML=result;

                  



            }

        </script>
    </body>
    </html>
