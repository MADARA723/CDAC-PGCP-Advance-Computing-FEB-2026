<!-- 3) 
Write an HTML that arrays.html
Show a textfield -accept a value

Check if the value is present in the array ---display found or not found in a <p> tag

Show a button add-to-end } if this button is clicked then append in the array

Show a button insert-at-index , textfield to accept index
On click insert the value at that index and show the final array in another <p> tag

Show a button remove tf to accept index

Remove that element and show final array in another <p> -->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <input type="text" id="text">
        <button onclick="checkValue()">Check Value</button>
        <button onclick="addToEnd()">Add to End</button>
        <button onclick="insertAtIndex()">Insert at Index</button>
        <button onclick="removeAtIndex()">Remove at Index</button>
        <p id="result"></p>
        <p id="finalArray"></p>
        <script>
            let arr =[];
            function checkValue(){
                let value=document.getElementById("text").value;
                if(arr.includes(value)){
                    document.getElementById("result").innerText="Found";
                }
                else{
                    document.getElementById("result").innerText="Not Found";
                }
            }
            function addT0End(){
                let value=document.getElementById("text").value;
                arr.push(value);
                document.getElementById("finalArray").innerText=arr;
            }
            function insertAtIndex(){
                let value=document.getElementById("text").value;
                let index=prompt("Enter index");
                arr.splice(index,0,value);
                document.getElementById("finalArray").innerText=arr;
            }
            function removeAtIndex(){
                let index=prompt("Enter index to remove");
                arr.splice(index,1);
                document.getElementById("finalArray").innerText=arr;
            }
            

        </script>
    </body>
    </html>
