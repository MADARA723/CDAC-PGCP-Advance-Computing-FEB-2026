<!DOCTYPE html>
<html>
<head>
<title>New User</title>

<script>

function displayData(){

var fname=document.getElementById("fname").value;
var lname=document.getElementById("lname").value;
var uname=document.getElementById("uname").value;
var email=document.getElementById("email").value;

document.getElementById("result").innerHTML=

"<table border='1'>"+
"<tr><th>First Name</th><th>Last Name</th><th>Username</th><th>Email</th></tr>"+
"<tr>"+
"<td>"+fname+"</td>"+
"<td>"+lname+"</td>"+
"<td>"+uname+"</td>"+
"<td>"+email+"</td>"+
"</tr></table>";

}

</script>

</head>

<body>

<h2>New User Registration</h2>

<form onsubmit="displayData(); return false;">

<fieldset>
<legend>User Information</legend>

First Name:
<input type="text" id="fname" required><br><br>

Last Name:
<input type="text" id="lname" required><br><br>

Username:
<input type="text" id="uname" required><br><br>

Gender:
<input type="radio" name="gender" required>Male
<input type="radio" name="gender">Female<br><br>

Known Languages:
<input type="checkbox">English
<input type="checkbox">Marathi
<input type="checkbox">Hindi<br><br>

Email:
<input type="email" id="email" required><br><br>

Password:
<input type="password" required minlength="6"><br><br>

Re-enter Password:
<input type="password" required minlength="6"><br><br>

<input type="submit" value="Register">

</fieldset>

</form>

<br>

<div id="result"></div>

</body>
</html>
